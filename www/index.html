<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="building">
        <div id="cabin"></div>
        <div class="floor" id="floor1">
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="stair-door"></div>
            <div class="wall">
                <a href="#" data-NeoPixel="2" class="callbtn up"  >Up</a>
                <a href="#" data-NeoPixel="1" class="callbtn down">Down</a>
            </div>
        </div>
        <div class="floor" id="floor0">
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="stair-door"></div>
            <div class="wall">
                <a href="#" data-NeoPixel="9" class="callbtn up">Up</a>
           </div>
        </div>
        <div class="floor" id="floor3">
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="stair-door"></div>
            <div class="wall">
                <a href="#" data-NeoPixel="15" class="callbtn up">Up</a>
                <a href="#" data-NeoPixel="14" class="callbtn down">Down</a>
            </div>
        </div>
        <div class="floor" id="floor2">
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="stair-door"></div>
            <div class="wall">
                <a href="#" data-NeoPixel="13" class="callbtn up">Up</a>
                <a href="#" data-NeoPixel="12" class="callbtn down">Down</a>
            </div>
        </div>
        <div class="floor" id="floor5">
            <div class="cabin"></div>
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="stair-door"></div>
            <div class="wall">
                <a href="#" data-NeoPixel="18" class="callbtn down">Down</a>
            </div>
        </div>
        <div class="floor" id="floor4">
            <div class="door left"></div>
            <div class="door right"></div>
            <div class="stair-door"></div>
            <div class="wall">
                <a href="#" data-NeoPixel="17" class="callbtn up">Up</a>
                <a href="#" data-NeoPixel="16" class="callbtn down">Down</a>
            </div>
        </div>
        <div class="panel">
            <div class="screen"></div>
            <ul>
                <!--  Key     data-Keypad
                    1 2 3 A |  0  1  2  3
                    4 5 6 B |  4  5  6  7
                    7 8 9 C |  8  9 10 11
                    * 0 # D | 12 13 14 15
                -->
                <li><a href="#" class="btn row0" data-NeoPixel="4" data-Keypad="4">3</a></li>
                <li><a href="#" class="btn row0" data-NeoPixel="5" data-Keypad="5">4</a></li>
                <li><a href="#" class="btn row1" data-NeoPixel="2" data-Keypad="1">1</a></li>
                <li><a href="#" class="btn row1" data-NeoPixel="3" data-Keypad="2">2</a></li>
                <li><a href="#" class="btn row2" data-NeoPixel="0" data-Keypad="13">-1</a></li>
                <li><a href="#" class="btn row2" data-NeoPixel="1" data-Keypad="0">0</a></li>

                <li><a href="#" class="btn row3" data-NeoPixel="6" data-Keypad="7">&gt;&lt;</a></li>
                <li><a href="#" class="btn row3" data-NeoPixel="7" data-Keypad="11">&lt;&gt;</a></li>
            </ul>
            <a href="#" class="btnstop" data-NeoPixel="8" data-Keypad="15"></a>
        </div>
    </div>
    <script>
        window.wasmLoaded = new Promise(resolve => window.Module = { 
            onRuntimeInitialized: resolve 
        });
    </script>
    <script src="a.out.js"></script>
    <script type="module">
        import Wino from "./js/Wino.js"
        import Adafruit_NeoPixel from "./js/Adafruit_NeoPixel.js"
        import Keypad from "./js/Keypad.js"

        const NEOPIXEL_CSS = 'sel'
        const PIN_KEYPAD_ROWS = [ 11, 10, 9, 8 ]
        const PIN_KEYPAD_COLS = [  7,  6, 5, 4 ]
        const PIN_NEOPIXEL = 2
        
        await window.wasmLoaded
        const wino = new Wino(Module, [
            new Keypad           (Module, PIN_KEYPAD_ROWS, PIN_KEYPAD_COLS),
            new Adafruit_NeoPixel(Module, PIN_NEOPIXEL, (l, v) => Adafruit_NeoPixel.OnOff(l, v, NEOPIXEL_CSS))
        ]);

        const FLOOR_COUNT = 6;
        const FLOORS_BY_COLUMN = 2;
        const CABIN_FLOOR_X = 230;
        const CABIN_FLOOR_Y = 61;
        const CABIN_HEIGHT = 231;
        const FLOOR_HEIGHT = 430;
        const COLUMN_WIDTH = 518;
        const FIRST_FLOOR = CABIN_HEIGHT + FLOOR_HEIGHT;
        const COLUMN_HEIGHT   = FLOORS_BY_COLUMN*CABIN_HEIGHT + FLOOR_HEIGHT;
        const BUILDING_HEIGHT = (FLOOR_COUNT/FLOORS_BY_COLUMN)*COLUMN_HEIGHT - CABIN_HEIGHT;
        const DOOR_WIDTH = 92;
        const DOOR_LEFT = 134;
        const DOOR_RIGHT = 410;
        const cabin = document.querySelector('#cabin');
        const doors = [];
        const between = (n, min, max) => min <= n && n < max;

        let position = FIRST_FLOOR; 

        function currentFloor() {
            return Math.floor(position * 2 / COLUMN_HEIGHT);
        }
        function updateDoors(floor) {
            let door = doors[floor];

            door.left.style.left  = `${DOOR_LEFT + door.pos}px`;
            door.right.style.left = `${DOOR_RIGHT - door.pos}px`;
        }

        for(let i = 0; i < FLOOR_COUNT; i++) {
            doors.push({
                left : document.querySelector(`#floor${i} .left`), 
                right: document.querySelector(`#floor${i} .right`),
                pos: i==currentFloor() ? 0 : DOOR_WIDTH
            });
            updateDoors(i);
        }

        function moveDoors(floor, dir) {
            if(between(floor, 0, FLOOR_COUNT)) {
                nextPos = doors[floor].pos + dir;
                if(between(nextPos, 0, DOOR_WIDTH+1)) {
                    doors[floor].pos = nextPos;
                    updateDoors(floor);
                }
            }
        }
        function moveElevator(dir) {
            nextPos = position + dir;
            if(between(nextPos, CABIN_HEIGHT, BUILDING_HEIGHT)) {
                position = nextPos;    
                cabin.style.top  = `${2*FLOOR_HEIGHT - CABIN_FLOOR_Y - position % COLUMN_HEIGHT}px`;
                cabin.style.left = `${CABIN_FLOOR_X + COLUMN_WIDTH * Math.floor(position / COLUMN_HEIGHT)}px`;
            }
        }
    </script>
</body>
</html>
